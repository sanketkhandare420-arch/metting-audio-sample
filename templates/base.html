<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>{% block title %}Audio Action-Item Extractor{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .app-shell {
            min-height: calc(100vh - 112px);
        }
        .page-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 20px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
            padding: 36px;
            margin-bottom: 32px;
        }
        .feature-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 18px;
            border-left: 5px solid #667eea;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 28px;
            padding: 14px 30px;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.25);
        }
        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid #dee2e6;
            padding: 14px 16px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.18);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .status-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2000;
        }
        .status-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 28px;
            width: min(90%, 420px);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
        }
        .bg-gradient-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        }
        .bg-gradient-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        }
        .footer-bar {
            padding: 18px 0;
            color: #f8f9fa;
        }
        .footer-bar a {
            color: #f8f9fa;
            text-decoration: underline;
        }
        @media (max-width: 767px) {
            .page-card {
                padding: 24px;
            }
            .navbar-brand {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}">Audio Action-Item</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('history') }}">History</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container app-shell mt-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer-bar text-center bg-dark">
        <div class="container">
            <small>© 2026 Audio Action-Item Extractor • Built for smarter meeting workflows</small>
        </div>
    </footer>

    <div class="status-overlay" id="statusOverlay" aria-live="assertive" aria-busy="true">
        <div class="status-card">
            <div class="spinner-border text-primary mb-4" role="status" aria-hidden="true"></div>
            <h5 class="mb-3">Processing your meeting audio...</h5>
            <p class="text-muted mb-4">This may take a minute depending on file length.</p>
            <div class="progress" style="height: 10px; border-radius: 10px;">
                <div id="processingBar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 10%"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
